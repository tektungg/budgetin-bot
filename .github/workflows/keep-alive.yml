name: Keep Alive

on:
  schedule:
    # Setiap 25 menit — cegah Koyeb sleep (threshold 30 menit)
    - cron: "*/25 * * * *"
  workflow_dispatch: # bisa trigger manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/transactions?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "Supabase: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase is alive!"
          else
            echo "⚠️ Supabase ping returned $response"
          fi
